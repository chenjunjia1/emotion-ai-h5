<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="贝雷帽女生">
  <defs>
    <linearGradient id="hg-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8EE"/>
      <stop offset="100%" stop-color="#FFE4C4"/>
    </linearGradient>
    <linearGradient id="hg-beret" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E8A838"/>
      <stop offset="100%" stop-color="#C4841E"/>
    </linearGradient>
    <linearGradient id="hg-hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5E3C"/>
      <stop offset="100%" stop-color="#5C3D28"/>
    </linearGradient>
    <linearGradient id="hg-hair-hi" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B8845A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#5C3D28" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="hg-skin" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFE8DC"/>
      <stop offset="100%" stop-color="#F0C9A8"/>
    </linearGradient>
    <linearGradient id="hg-eye" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B4C3A"/>
      <stop offset="100%" stop-color="#2D1F14"/>
    </linearGradient>
    <linearGradient id="hg-coat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#EA8C4C"/>
    </linearGradient>
    <radialGradient id="hg-blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAB8A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFAB8A" stop-opacity="0"/>
    </radialGradient>
    <filter id="hg-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#hg-bg)"/>
  <path d="M35 198c12-32 38-48 65-48s53 16 65 48H35z" fill="url(#hg-coat)"/>
  <path d="M54 158c14-10 46-10 92 0v28H54V158z" fill="#D97706"/>
  <ellipse cx="100" cy="172" rx="42" ry="8" fill="#B45309" opacity="0.3"/>
  <!-- 后发 -->
  <path d="M48 100c-4-36 20-58 52-58s56 22 52 58c-2 22-12 38-26 46-8 5-18 8-26 8s-18-3-26-8c-14-8-24-24-26-46z" fill="url(#hg-hair)"/>
  <path d="M54 94c2-28 22-44 46-44s44 16 46 44c0 10-4 18-10 24-10 8-24 10-36 10s-26-2-36-10c-6-6-10-14-10-24z" fill="url(#hg-hair-hi)"/>
  <!-- 贝雷帽 -->
  <ellipse cx="100" cy="58" rx="52" ry="16" fill="url(#hg-beret)"/>
  <path d="M42 62c10-28 36-38 58-38s48 10 58 38c-16-6-100-6-116 0z" fill="#C4841E"/>
  <ellipse cx="100" cy="52" rx="38" ry="10" fill="#F5D060" opacity="0.35"/>
  <circle cx="128" cy="50" r="4" fill="#FFF8DC" opacity="0.5"/>
  <!-- 脸 -->
  <ellipse cx="100" cy="118" rx="36" ry="40" fill="url(#hg-skin)" filter="url(#hg-soft)"/>
  <!-- 刘海 -->
  <path d="M62 88c6-14 18-22 38-22s32 8 38 22c-6-4-14-6-24-6h-28c-10 0-18 2-24 6z" fill="url(#hg-hair)"/>
  <g>
    <ellipse cx="76" cy="122" rx="10" ry="12" fill="#fff"/>
    <ellipse cx="76" cy="124" rx="7" ry="9" fill="url(#hg-eye)"/>
    <ellipse cx="74" cy="120" rx="3" ry="3.8" fill="#fff"/>
    <circle cx="78" cy="126" r="1.4" fill="#fff" opacity="0.7"/>
    <path d="M64 116 Q70 112 76 114" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <g>
    <ellipse cx="124" cy="122" rx="10" ry="12" fill="#fff"/>
    <ellipse cx="124" cy="124" rx="7" ry="9" fill="url(#hg-eye)"/>
    <ellipse cx="122" cy="120" rx="3" ry="3.8" fill="#fff"/>
    <circle cx="126" cy="126" r="1.4" fill="#fff" opacity="0.7"/>
    <path d="M124 114 Q130 112 136 116" stroke="#8B5E3C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <ellipse cx="64" cy="132" rx="9" ry="5" fill="url(#hg-blush)"/>
  <ellipse cx="136" cy="132" rx="9" ry="5" fill="url(#hg-blush)"/>
  <path d="M98 132 L100 136 L102 132" stroke="#E0A088" stroke-width="1.2" fill="none"/>
  <path d="M90 142 Q100 150 110 142" stroke="#D98A7A" stroke-width="2.2" fill="none" stroke-linecap="round"/>
</svg>
