<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="鸭舌帽男生">
  <defs>
    <linearGradient id="cb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ECFEFF"/>
      <stop offset="100%" stop-color="#BAE6FD"/>
    </linearGradient>
    <linearGradient id="cb-cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#64748B"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="cb-cap-bill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="cb-hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B5344"/>
      <stop offset="100%" stop-color="#3D2E24"/>
    </linearGradient>
    <linearGradient id="cb-skin" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#FFE5D4"/>
      <stop offset="100%" stop-color="#E8C4A8"/>
    </linearGradient>
    <linearGradient id="cb-eye" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="100%" stop-color="#1A120C"/>
    </linearGradient>
    <linearGradient id="cb-hoodie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#64748B"/>
    </linearGradient>
    <radialGradient id="cb-blush" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0A890" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#F0A890" stop-opacity="0"/>
    </radialGradient>
    <filter id="cb-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="b"/>
      <feOffset dy="2" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode in="o"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#cb-bg)"/>
  <path d="M35 198c12-32 38-48 65-48s53 16 65 48H35z" fill="url(#cb-hoodie)"/>
  <path d="M56 158c14-8 40-8 88 0v30H56V158z" fill="#475569"/>
  <ellipse cx="100" cy="172" rx="40" ry="7" fill="#334155" opacity="0.28"/>
