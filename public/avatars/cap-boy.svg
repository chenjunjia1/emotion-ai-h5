    <ellipse cx="124" cy="124" rx="7" ry="9" fill="url(#cb-eye)"/>
    <ellipse cx="122" cy="120" rx="2.8" ry="3.5" fill="#fff"/>
    <circle cx="126" cy="126" r="1.4" fill="#fff" opacity="0.65"/>
    <path d="M124 114 Q130 112 136 116" stroke="#6B5344" stroke-width="1.5" fill="none" stroke-linecap="round"/>
