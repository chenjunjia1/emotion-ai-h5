  <path d="M28 72c18-14 68-18 96-4 8 4 10 14 8 22l-4 14H36l-4-14c-2-10 2-18 10-22 6-4 14-6 22-6z" fill="url(#cb-cap)"/>
  <path d="M36 68c20-16 56-18 80-8 4 2 6 8 4 14" fill="#475569"/>
